# J FIGHT API — reverse proxy no aaPanel (Nginx)
# 1) Crie site no aaPanel: api.SEUDOMINIO.com (ou use api.jracing.dev.br)
# 2) DNS A → 56.125.221.106
# 3) SSL Let's Encrypt no aaPanel
# 4) Cole este bloco em Configuração → Reverse proxy OU substitua o location /

location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

# Teste: curl https://api.SEUDOMINIO.com/health
